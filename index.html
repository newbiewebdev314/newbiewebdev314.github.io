<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube Player</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: system-ui, sans-serif;
        color: #fff;
      }
      .container {
        width: 100%;
        max-width: 960px;
        aspect-ratio: 16/9;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
      .error {
        text-align: center;
        font-size: 1.2rem;
        padding: 2rem;
      }
    </style>
  </head>
  <body>
    <div id="player-container" class="container">
      <div class="error" id="error-message"></div>
    </div>

    <script>
      (function() {
        const params = new URLSearchParams(window.location.search);
        const videoId = params.get('v'); // YouTube video ID

        const container = document.getElementById('player-container');
        const errorEl = document.getElementById('error-message');

        if (!videoId) {
          errorEl.textContent = 'No video ID provided. Add ?v=YOUR_VIDEO_ID to the URL.';
          return;
        }

        // Create iframe for YouTube embed (free, no API key needed)
        const iframe = document.createElement('iframe');
        iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=0&rel=0`;
        iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen';
        iframe.allowFullScreen = true;
        iframe.title = 'YouTube video player';

        // Replace error placeholder with the iframe
        container.innerHTML = '';
        container.appendChild(iframe);
      })();
    </script>
  </body>
</html>
